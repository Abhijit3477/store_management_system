<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Store Manager PRO</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body class="split-body">
    <div class="split-container">
        <!-- Left Panel -->
        <div class="split-left">
            <div class="sphere sphere-1"></div>
            <div class="sphere sphere-2"></div>
            <div class="split-content">
                <h2>SECURITY TASK</h2>
                <h1>Access Recovery</h1>
                <p>Safety is our top priority. Please verify your identity and set a new secure password to regain access to your dashboard.</p>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="split-right">
            <div class="form-wrapper" style="animation-delay: 0.1s;">
                <h3>Reset Access</h3>
                <p class="subtitle">Assign a new strong password</p>
                
                <div th:if="${error}" class="alert alert-error animate-down">
                    <svg style="width:20px; height:20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span th:text="${error}">Error message</span>
                </div>

                <form th:action="@{/forgot-password}" method="post">
                    <div class="input-container">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        <input type="text" id="username" name="username" class="input-field" placeholder="User Name" required autofocus />
                    </div>
                    
                    <div class="input-container">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                        <input type="password" id="newPassword" name="newPassword" class="input-field" placeholder="New Secure Password" required />
                        <span class="show-password" onclick="togglePassword()">SHOW</span>
                    </div>
                    
                    <button type="submit" class="btn-signin">Commit Password Update</button>
                    
                    <div class="divider">Or</div>
                    
                    <button type="button" class="btn-other" onclick="window.location.href='/login'">Return to Login</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        function togglePassword() {
            const p = document.getElementById('newPassword');
            const s = document.querySelector('.show-password');
            p.type = p.type === 'password' ? 'text' : 'password';
            s.textContent = p.type === 'password' ? 'SHOW' : 'HIDE';
        }
    </script>
</body>
</html>
